<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뽕뽕이 어드벤처</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    .font-black-hans { font-weight: 900; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .animate-in.fade-in { animation: fade-in 0.8s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const Icon = ({ children, size = 20, className = "" }) => (
      <span className={"inline-flex items-center justify-center " + className} style={{ width: size, height: size, fontSize: size * 0.9 }}>
        {children}
      </span>
    );
    const Home = (p) => <Icon {...p}>🏠</Icon>;
    const Sword = (p) => <Icon {...p}>⚔️</Icon>;
    const ShoppingCart = (p) => <Icon {...p}>🛒</Icon>;
    const Zap = (p) => <Icon {...p}>⚡</Icon>;
    const PlusSquare = (p) => <Icon {...p}>➕</Icon>;
    const Play = (p) => <Icon {...p}>▶️</Icon>;
    const Package = (p) => <Icon {...p}>📦</Icon>;
    const Skull = (p) => <Icon {...p}>💀</Icon>;
    const CheckCircle = (p) => <Icon {...p}>✅</Icon>;
    const Timer = (p) => <Icon {...p}>⏱️</Icon>;

    const App = () => {
      const [view, setView] = useState('main');
      const [score, setScore] = useState(0);
      const [activeCount, setActiveCount] = useState(0);
      const [isMouthOpen, setIsMouthOpen] = useState(false);
      const [message, setMessage] = useState("");
      const [showCutscene, setShowCutscene] = useState(false);
      const [hasPlayedCutscene, setHasPlayedCutscene] = useState(false);

      const [ppongPos, setPpongPos] = useState({ x: 50, y: 60 });
      const [isAttacking, setIsAttacking] = useState(false);
      const [canAttack, setCanAttack] = useState(true);
      const [goblins, setGoblins] = useState([]);
      const [boss, setBoss] = useState(null);
      const [bossLevel, setBossLevel] = useState(1);
      const [bossTimer, setBossTimer] = useState(30);
      const [showWeaponShop, setShowWeaponShop] = useState(false);

      const [config, setConfig] = useState({
        speed: 0.6, multiplier: 1, autoRate: 0, capacity: 3,
        levels: { speed: 1, multi: 1, auto: 0, basket: 1 },
        costs: { speed: 10, multi: 50, auto: 100, basket: 30 }
      });

      const weapons = [
        { id: 0, name: "전서르의 검", damage: 10, color: "#ffd700", cost: 0, type: "melee", cooldown: 250 },
        { id: 1, name: "바사삭 창", damage: 30, color: "#4ade80", cost: 200, type: "melee", cooldown: 300 },
        { id: 2, name: "방사능 대검", damage: 80, color: "#a855f7", cost: 800, type: "melee", cooldown: 500 },
        { id: 3, name: "리볼버", damage: 250, color: "#475569", cost: 1000, type: "ranged", cooldown: 750 },
        { id: 4, name: "뽕뽕이의 심판", damage: 600, color: "#f43f5e", cost: 2500, type: "melee", cooldown: 600 }
      ];

      const [ownedWeapons, setOwnedWeapons] = useState([0]);
      const [currentWeapon, setCurrentWeapon] = useState(weapons[0]);

      const stateRef = useRef({
        score, activeCount, capacity: 3, speed: 0.6,
        multiplier: 1, damage: 10, weaponType: "melee", ppongPos
      });

      useEffect(() => {
        stateRef.current = {
          score, activeCount, capacity: config.capacity, speed: config.speed,
          multiplier: config.multiplier, damage: currentWeapon.damage,
          weaponType: currentWeapon.type, ppongPos
        };

        if (score >= 10000 && !hasPlayedCutscene) {
          setShowCutscene(true);
          setHasPlayedCutscene(true);
        }
      }, [score, activeCount, config, currentWeapon, ppongPos, hasPlayedCutscene]);

      const showToast = (msg) => {
        setMessage(msg);
        setTimeout(() => setMessage(""), 2500);
      };

      const triggerEffect = (x, y, text, icon) => {
        const el = document.createElement('div');
        el.className = "fixed pointer-events-none z-[400] text-3xl font-black animate-bounce flex items-center gap-1 drop-shadow-xl";
        el.style.left = `${x}px`;
        el.style.top = `${y - 60}px`;
        el.innerHTML = `<span style="color: #f97316;">${icon}</span> <span style="color: #ffffff; -webkit-text-stroke: 1.5px #ea580c;">${text}</span>`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
      };

      useEffect(() => { setIsMouthOpen(activeCount > 0); }, [activeCount]);

      useEffect(() => {
        if (config.autoRate > 0) {
          const interval = setInterval(() => {
            if (view === 'main') {
              for (let i = 0; i < config.autoRate; i++) {
                setTimeout(() => {
                  const sx = Math.random() > 0.5 ? -100 : window.innerWidth + 100;
                  spawnShrimp(sx, Math.random() * window.innerHeight, true);
                }, i * 250);
              }
            } else {
              setScore(s => s + (config.autoRate * 2));
            }
          }, 2000);
          return () => clearInterval(interval);
        }
      }, [config.autoRate, view]);

      useEffect(() => {
        if (view === 'dungeon') {
          const interval = setInterval(() => {
            if (goblins.length < 4 && !boss) {
              let newX = 15 + Math.random() * 70;
              let newY = 15 + Math.random() * 55;
              setGoblins(prev => [...prev, {
                id: Math.random().toString(36).substr(2, 9),
                x: newX, y: newY, size: 70
              }]);
            }

            if (!boss) {
              setBossTimer(t => {
                if (t <= 1) {
                  const maxHp = 250 * bossLevel;
                  setBoss({ id: 'boss', x: 50, y: 35, hp: maxHp, maxHp: maxHp, level: bossLevel });
                  showToast(`🚨 레벨 ${bossLevel} 보스 출현!`);
                  return 30;
                }
                return t - 1;
              });
            }
          }, 1000);
          return () => clearInterval(interval);
        } else {
          setBossTimer(30);
          setGoblins([]);
          setBoss(null);
        }
      }, [view, goblins.length, boss, bossLevel]);

      const spawnShrimp = useCallback((x, y, isAuto = false) => {
        if (!isAuto && stateRef.current.activeCount >= stateRef.current.capacity) return;
        const shrimpEl = document.createElement('div');
        shrimpEl.className = "fixed pointer-events-none z-[70] transition-all ease-out";
        shrimpEl.style.transitionDuration = `${stateRef.current.speed}s`;
        shrimpEl.style.left = `${x - 25}px`;
        shrimpEl.style.top = `${y - 25}px`;
        shrimpEl.innerHTML = `<svg width="50" height="50" viewBox="0 0 50 50"><path d="M10,30 Q25,10 40,30" fill="none" stroke="#fb923c" stroke-width="7" stroke-linecap="round"/><circle cx="40" cy="30" r="5" fill="#ea580c"/></svg>`;
        document.body.appendChild(shrimpEl);
        setActiveCount(prev => prev + 1);

        const char = document.getElementById('ppong-main-char');
        if (char) {
          const rect = char.getBoundingClientRect();
          const tx = rect.left + rect.width / 2;
          const ty = rect.top + rect.height / 2 + 30;
          setTimeout(() => {
            shrimpEl.style.left = `${tx - 25}px`;
            shrimpEl.style.top = `${ty - 25}px`;
            shrimpEl.style.transform = "scale(0.1) rotate(720deg)";
            shrimpEl.style.opacity = "0";
          }, 20);
        }
        setTimeout(() => {
          if (document.body.contains(shrimpEl)) {
            shrimpEl.remove();
            setScore(s => s + stateRef.current.multiplier);
            setActiveCount(c => Math.max(0, c - 1));
          }
        }, stateRef.current.speed * 1000);
      }, []);

      const handleGlobalClick = (e) => {
        if (e.target.closest('.ui-layer')) return;

        if (view === 'main') {
          spawnShrimp(e.clientX, e.clientY);
        } else {
          if (!canAttack) return;

          const rect = e.currentTarget.getBoundingClientRect();
          const xp = ((e.clientX - rect.left) / rect.width) * 100;
          const yp = ((e.clientY - rect.top) / rect.height) * 100;
          const finalY = Math.min(Math.max(yp, 5), 75);
          const finalX = Math.min(Math.max(xp, 5), 95);

          if (currentWeapon.type !== "ranged") setPpongPos({ x: finalX, y: finalY });

          setIsAttacking(true);
          setCanAttack(false);
          setTimeout(() => setIsAttacking(false), 150);
          setTimeout(() => setCanAttack(true), currentWeapon.cooldown);

          if (currentWeapon.id === 3) {
            const muzzle = document.getElementById('muzzle-point');
            if (muzzle) {
              const mRect = muzzle.getBoundingClientRect();
              const bullet = document.createElement('div');
              bullet.className = "fixed pointer-events-none z-[300] bg-orange-400 rounded-full shadow-[0_0_20px_orange]";
              bullet.style.width = "18px";
              bullet.style.height = "18px";
              bullet.style.left = `${mRect.left}px`;
              bullet.style.top = `${mRect.top}px`;
              bullet.style.transition = "all 0.1s linear";
              document.body.appendChild(bullet);
              requestAnimationFrame(() => {
                bullet.style.left = `${e.clientX - 9}px`;
                bullet.style.top = `${e.clientY - 9}px`;
              });
              setTimeout(() => bullet.remove(), 100);
            }
          }

          if (boss) {
            const dist = Math.sqrt(Math.pow(boss.x - xp, 2) + Math.pow(boss.y - yp, 2));
            if (dist < 35) {
              setBoss(prev => {
                if (!prev) return null;
                const nhp = Math.max(0, prev.hp - currentWeapon.damage);
                triggerEffect(e.clientX, e.clientY, `-${currentWeapon.damage} HP`, "💥");
                if (nhp <= 0) {
                  const reward = 500 + (bossLevel * 200);
                  setScore(s => s + reward);
                  setBossLevel(l => l + 1);
                  showToast(`전설 보스 처치! +${reward} 🍤`);
                  return null;
                }
                return { ...prev, hp: nhp };
              });
              return;
            }
          }

          setGoblins(prev => {
            let killed = false;
            const next = prev.filter(g => {
              if (Math.sqrt(Math.pow(g.x - xp, 2) + Math.pow(g.y - yp, 2)) < 25) {
                killed = true;
                triggerEffect(e.clientX, e.clientY, "+10 🍤", "⚔️");
                return false;
              }
              return true;
            });
            if (killed) setScore(s => s + 10);
            return next;
          });
        }
      };

      const buyUpgrade = (type) => {
        const cost = config.costs[type];
        if (score >= cost) {
          setScore(s => s - cost);
          setConfig(prev => ({
            ...prev,
            levels: { ...prev.levels, [type]: prev.levels[type] + 1 },
            costs: { ...prev.costs, [type]: Math.floor(cost * (type === 'basket' ? 1.8 : 2.5)) },
            speed: type === 'speed' ? Math.max(0.1, prev.speed * 0.8) : prev.speed,
            multiplier: type === 'multi' ? prev.multiplier + 1 : prev.multiplier,
            autoRate: type === 'auto' ? prev.autoRate + 1 : prev.autoRate,
            capacity: type === 'basket' ? prev.capacity + 2 : prev.capacity
          }));
          showToast("강화 성공! ⚡");
        }
      };

      const buyWeapon = (w) => {
        if (ownedWeapons.includes(w.id)) {
          setCurrentWeapon(w);
          showToast(`${w.name} 장착 완료!`);
          return;
        }
        if (score >= w.cost) {
          setScore(s => s - w.cost);
          setOwnedWeapons(prev => [...prev, w.id]);
          setCurrentWeapon(w);
          showToast(`${w.name} 획득!`);
        }
      };

      const PpongAvatar = ({ size = 100, open = false, weapon = null, idPrefix = "" }) => {
        return (
          <div id={idPrefix} className="relative flex items-center justify-center pointer-events-auto">
            <svg viewBox="0 0 200 200" style={{ width: size, height: size }} className="drop-shadow-2xl overflow-visible">
              <ellipse cx="100" cy="130" rx="85" ry="70" fill="#a17a52" />
              <circle cx="100" cy="80" r="70" fill="#a17a52" />
              <circle cx="70" cy="70" r="8" fill="#1a1a1a" />
              <circle cx="130" cy="70" r="8" fill="#1a1a1a" />
              <g>
                <ellipse cx="82" cy="105" rx="25" ry="20" fill="white" />
                <ellipse cx="118" cy="105" rx="25" ry="20" fill="white" />
                <circle cx="100" cy="118" r={open ? 26 : 0} fill="#4a3728" className="transition-all duration-200" />
                <circle cx="100" cy="98" r="12" fill="#3e2723" />
              </g>
              <path d="M 55 105 L 15 95 M 55 120 L 15 135 M 145 105 L 185 95 M 145 120 L 185 135" stroke="#1a1a1a" strokeWidth="4" strokeLinecap="round" />
            </svg>

            {weapon && (
              <div className="absolute" style={{
                right: `-${size * 0.45}px`,
                bottom: `${size * 0.05}px`,
                transformOrigin: '0% 100%',
                transform: isAttacking ? (weapon.type === 'melee' ? 'rotate(100deg)' : 'scale(1.3) translate(10px, -5px)') : 'rotate(0deg)',
                transition: 'transform 0.1s',
                zIndex: 20
              }}>
                <svg width={size * 0.7} height={size * 0.7} viewBox="0 0 120 120" className="overflow-visible">
                  <defs><filter id="glow-v9"><feGaussianBlur stdDeviation="3" result="cb"/><feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                  {weapon.id === 0 && <path d="M 10 110 L 110 10" stroke="#ffd700" strokeWidth="12" strokeLinecap="round" filter="url(#glow-v9)" />}
                  {weapon.id === 1 && (
                    <g><path d="M 10 110 L 115 5" stroke="#451a03" strokeWidth="8" strokeLinecap="round" /><path d="M 105 15 L 125 -5 L 110 25 Z" fill="#4ade80" filter="url(#glow-v9)" /></g>
                  )}
                  {weapon.id === 2 && <path d="M 15 105 L 90 30" stroke="#a855f7" strokeWidth="26" strokeLinecap="round" filter="url(#glow-v9)" />}
                  {weapon.id === 3 && (
                    <g transform="translate(10,60)">
                      <rect x="0" y="0" width="85" height="35" rx="6" fill="#334155" />
                      <rect x="0" y="30" width="25" height="50" rx="6" fill="#1e293b" />
                      <circle id="muzzle-point" cx="85" cy="17" r="3" fill="transparent" />
                      {isAttacking && <circle cx="105" cy="17" r="25" fill="#fbbf24" className="animate-ping" opacity="0.6" />}
                    </g>
                  )}
                  {weapon.id === 4 && (
                    <g filter="url(#glow-v9)"><path d="M 10 110 L 70 50" stroke="#312e81" strokeWidth="14" strokeLinecap="round" /><rect x="60" y="20" width="60" height="60" rx="14" fill="#f43f5e" transform="rotate(-45 90 50)" /></g>
                  )}
                  <g transform="translate(60, 115)">
                    <rect x="-45" y="-12" width="90" height="20" rx="6" fill="rgba(0,0,0,0.9)" />
                    <text x="0" y="2" fill={weapon.color} fontSize="12" fontWeight="900" textAnchor="middle" dominantBaseline="middle" style={{ paintOrder: 'stroke', stroke: '#000', strokeWidth: '0.5px' }}>{weapon.name}</text>
                  </g>
                </svg>
              </div>
            )}
          </div>
        );
      };

      return (
        <div onMouseDown={handleGlobalClick} className={`min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden select-none transition-all duration-700 ${view === 'main' ? 'bg-emerald-50' : 'bg-slate-950'}`}>
          {showCutscene && (
            <div className="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center p-8 text-center animate-in fade-in duration-1000">
              <div className="relative w-full max-w-lg h-[450px] bg-gradient-to-b from-blue-950 to-black rounded-[4rem] border-8 border-yellow-500 shadow-[0_0_100px_rgba(234,179,8,0.4)] overflow-hidden">
                <div className="absolute bottom-0 left-1/2 -translate-x-1/2 text-[220px] opacity-60 filter drop-shadow-[0_0_20px_gold]">🗼</div>
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center animate-bounce mt-[-30px]">
                  <div className="relative flex flex-col items-center">
                    <div className="absolute top-[-25px] z-10 w-20 h-20 drop-shadow-lg">
                      <svg viewBox="0 0 100 100">
                        <path d="M 20 55 Q 15 35 35 30 Q 50 18 65 30 Q 85 35 80 55" fill="white" stroke="#e2e8f0" strokeWidth="2" />
                        <rect x="25" y="50" width="50" height="15" rx="3" fill="white" stroke="#e2e8f0" strokeWidth="2" />
                      </svg>
                    </div>
                    <div className="text-9xl filter drop-shadow-[0_15px_30px_rgba(251,146,60,0.6)]">🦐</div>
                  </div>
                  <div className="mt-2 scale-110"><span className="text-8xl animate-spin" style={{ animationDuration: '1.2s' }}>🍳</span></div>
                </div>
                <div className="absolute bottom-12 w-full text-white font-black px-6 bg-black/50 py-5 backdrop-blur-md border-t border-white/10">
                  <h2 className="text-2xl text-yellow-400 font-black-hans drop-shadow-lg mb-1 uppercase tracking-tighter">Legendary Chef Unlocked!</h2>
                  <p className="text-sm opacity-90 uppercase tracking-[0.4em] font-bold">10,000 Shrimps Achieved</p>
                </div>
              </div>
              <button onClick={() => setShowCutscene(false)} className="mt-10 bg-yellow-500 text-black px-14 py-5 rounded-full font-black text-2xl shadow-2xl hover:scale-105 active:scale-95 transition-all border-b-8 border-yellow-700">확인 완료 🍤</button>
            </div>
          )}

          {view === 'main' && (
            <div className="absolute inset-0 pointer-events-none z-0">
              <div className="absolute bottom-0 w-full h-1/4 bg-emerald-100/50 rounded-t-[100px]" />
              <div className="absolute top-20 left-20 w-40 h-40 bg-yellow-200/30 rounded-full blur-3xl animate-pulse" />
              <div className="absolute bottom-40 left-[10%] text-8xl opacity-10">🌳</div>
              <div className="absolute bottom-20 right-[15%] text-9xl opacity-10">🏡</div>
            </div>
          )}

          {message && (
            <div className="fixed top-8 left-1/2 -translate-x-1/2 bg-black/90 text-white px-8 py-4 rounded-full font-black z-[500] animate-bounce shadow-2xl flex items-center gap-3 border-2 border-emerald-400">
              <CheckCircle size={24} className="text-emerald-400" /> {message}
            </div>
          )}

          <div className="flex flex-col lg:flex-row gap-6 items-start w-full max-w-6xl z-10">
            <div className="flex-1 flex flex-col items-center w-full relative">
              <div className="ui-layer bg-white/95 backdrop-blur-md p-6 rounded-[2.5rem] shadow-2xl border-2 border-emerald-100 w-full max-w-md mb-8">
                <div className="flex gap-4 mb-6 font-bold">
                  <button onClick={() => setView('main')} className={`flex-1 flex items-center justify-center gap-2 py-4 rounded-2xl transition-all ${view === 'main' ? 'bg-emerald-500 text-white shadow-lg scale-105' : 'bg-gray-100 text-gray-400'}`}><Home size={20} /> 마을</button>
                  <button onClick={() => setView('dungeon')} className={`flex-1 flex items-center justify-center gap-2 py-4 rounded-2xl transition-all ${view === 'dungeon' ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'bg-gray-100 text-gray-400'}`}><Sword size={20} /> 던전</button>
                </div>
                <div className="bg-emerald-50 py-6 rounded-3xl border-2 border-emerald-200 text-center relative shadow-inner">
                  <div className="text-[10px] text-emerald-500 font-black tracking-widest block mb-1 uppercase font-bold">Shrimp Vault</div>
                  <div className="text-5xl font-black text-emerald-600 tracking-tighter drop-shadow-sm font-black-hans">🍤 {score}</div>
                </div>
              </div>

              <div className="relative w-full flex justify-center items-center">
                {view === 'main' ? (
                  <div className="relative transition-transform duration-150 cursor-pointer">
                    <PpongAvatar idPrefix="ppong-main-char" open={isMouthOpen} size={320} />
                    <div className="absolute top-[-50px] left-1/2 -translate-x-1/2 bg-white px-6 py-2 rounded-2xl shadow-xl text-emerald-900 font-black text-sm border-2 border-emerald-100 whitespace-nowrap animate-pulse font-bold uppercase tracking-tighter">CLICK TO FEED! 🍤</div>
                  </div>
                ) : (
                  <div className="w-[340px] md:w-[650px] h-[650px] bg-slate-900/80 rounded-[4rem] border-8 border-white/10 relative overflow-hidden shadow-2xl backdrop-blur-md cursor-crosshair">
                    <div className="absolute top-8 left-0 w-full px-8 flex justify-between items-center z-[100] ui-layer">
                      {!boss && (
                        <div className="flex items-center gap-2 bg-black/80 backdrop-blur-sm px-5 py-3 rounded-full text-white font-black text-sm border border-white/20 shadow-2xl">
                          <Timer size={18} className="text-indigo-400 animate-pulse" /> Next Boss: {bossTimer}s
                        </div>
                      )}
                      <div className="flex-1" />
                      <button onClick={(e) => { e.stopPropagation(); setShowWeaponShop(true); }} className="bg-indigo-500 text-white px-6 py-3.5 rounded-2xl font-black shadow-xl hover:bg-indigo-400 transition-all flex items-center gap-2 active:scale-95 border-b-4 border-indigo-700">
                        <Sword size={22} /> 무기 상점
                      </button>
                    </div>

                    {boss && (
                      <div className="absolute top-20 left-1/2 -translate-x-1/2 w-2/3 z-20">
                        <div className="flex justify-between items-end mb-2">
                          <div className="flex items-center gap-1 text-red-500 font-black text-sm uppercase italic drop-shadow-lg"><Skull size={20} /> Level {boss.level} BOSS</div>
                          <div className="text-white/60 font-black text-[10px]">{Math.ceil(boss.hp)} / {boss.maxHp}</div>
                        </div>
                        <div className="bg-gray-950 h-6 rounded-full border-2 border-white/20 overflow-hidden shadow-2xl">
                          <div className="h-full bg-gradient-to-r from-red-600 via-orange-500 to-yellow-400 transition-all duration-300" style={{width: `${(boss.hp / boss.maxHp) * 100}%`}}/>
                        </div>
                      </div>
                    )}

                    {boss && (
                      <div className="absolute animate-bounce" style={{left: `${boss.x}%`, top: `${boss.y}%`, transform: 'translate(-50%, -50%)'}}>
                        <svg width={200 + (bossLevel * 4)} height={200 + (bossLevel * 4)} viewBox="0 0 100 100" className="drop-shadow-[0_0_60px_rgba(239,68,68,0.7)]">
                          <circle cx="50" cy="50" r="45" fill="#064e3b" stroke="#ef4444" strokeWidth={bossLevel > 5 ? 6 : 3} />
                          <circle cx="35" cy="40" r="8" fill="#ef4444" className="animate-pulse" />
                          <circle cx="65" cy="40" r="8" fill="#ef4444" className="animate-pulse" />
                          <path d="M30 70 Q50 85 70 70" fill="none" stroke="white" strokeWidth="6" strokeLinecap="round" />
                          <path d="M30 15 L10 35 L50 35 Z" fill="#fbbf24" stroke="#d97706" strokeWidth="1.5" />
                          <path d="M70 15 L50 35 L90 35 Z" fill="#fbbf24" stroke="#d97706" strokeWidth="1.5" />
                        </svg>
                      </div>
                    )}

                    {goblins.map(g => (
                      <div key={g.id} className="absolute transition-all duration-500" style={{left: `${g.x}%`, top: `${g.y}%`, width: g.size, height: g.size, transform: 'translate(-50%, -50%)'}}>
                        <svg width="100%" height="100%" viewBox="0 0 100 100" className="drop-shadow-[0_8px_20px_rgba(0,0,0,0.6)]">
                          <circle cx="50" cy="50" r="40" fill="#4ade80"/><path d="M50 5 L35 25 L65 25 Z" fill="#fbbf24"/>
                          <circle cx="35" cy="45" r="5" fill="black"/><circle cx="65" cy="45" r="5" fill="black"/>
                          <path d="M 40 60 Q 45 68 50 60 Q 55 68 60 60" fill="none" stroke="black" strokeWidth="4" strokeLinecap="round"/>
                        </svg>
                      </div>
                    ))}

                    <div className="absolute transition-all duration-300 pointer-events-none" style={{left: `${ppongPos.x}%`, top: `${ppongPos.y}%`, transform: 'translate(-50%, -50%)'}}>
                      <PpongAvatar idPrefix="ppong-hero-visual" open={false} weapon={currentWeapon} size={150} />
                    </div>

                    {showWeaponShop && (
                      <div className="ui-layer absolute inset-0 bg-slate-950/95 z-[150] flex items-center justify-center p-8 backdrop-blur-2xl">
                        <div className="bg-white rounded-[3.5rem] p-8 w-full max-w-[320px] shadow-2xl relative border-4 border-indigo-200">
                          <button onClick={(e) => { e.stopPropagation(); setShowWeaponShop(false); }} className="absolute -top-5 -right-5 bg-red-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-90 transition-all z-[160] border-4 border-white"><span className="text-3xl font-bold">❌</span></button>
                          <h3 className="text-2xl font-black text-indigo-900 mb-6 flex items-center gap-3 border-b-4 border-indigo-50 pb-4"><Sword size={26} className="text-indigo-500" /> 무기 상점</h3>
                          <div className="space-y-3">
                            {weapons.map(w => (
                              <button key={w.id} onClick={() => buyWeapon(w)} disabled={!ownedWeapons.includes(w.id) && score < w.cost} className={`w-full flex items-center justify-between p-4 rounded-3xl border-4 transition-all ${currentWeapon.id === w.id ? 'border-indigo-500 bg-indigo-50 shadow-inner' : 'border-gray-100 hover:border-indigo-100 bg-white shadow-sm'} disabled:opacity-30 disabled:grayscale`}>
                                <div className="text-left">
                                  <div className="font-black text-sm mb-0.5" style={{ color: w.color }}>{w.name}</div>
                                  <div className="text-[10px] text-gray-500 font-bold uppercase tracking-tight">ATK: {w.damage}</div>
                                </div>
                                <div className="font-black text-[11px] text-indigo-600">{ownedWeapons.includes(w.id) ? (currentWeapon.id === w.id ? "장착중" : "보유") : `🍤${w.cost}`}</div>
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>

            <div className="ui-layer w-full lg:w-80 flex flex-col gap-4 z-30">
              <div className="bg-white/95 backdrop-blur-md p-6 rounded-[3rem] shadow-2xl border-2 border-emerald-100">
                <h2 className="text-xl font-black text-emerald-900 mb-6 flex items-center gap-3 font-bold uppercase tracking-tight"><ShoppingCart size={22} className="text-emerald-500" /> GEAR SHOP</h2>
                <div className="grid gap-3 font-bold">
                  {[
                    { id: 'speed', icon: <Zap size={20}/>, title: '튼튼한 집게', desc: '비행 속도 UP' },
                    { id: 'multi', icon: <PlusSquare size={20}/>, title: '더블 포크', desc: '새우 획득 +1' },
                    { id: 'basket', icon: <Package size={20}/>, title: '새우 바구니', desc: '동시 식사 +2' },
                    { id: 'auto', icon: <Play size={20}/>, title: '자동 급식기', desc: '자동 새우 공급' },
                  ].map(item => (
                    <button key={item.id} onClick={() => buyUpgrade(item.id)} disabled={score < config.costs[item.id]} className="bg-white border-2 border-gray-100 p-4 rounded-[1.5rem] flex items-center gap-4 hover:border-emerald-400 active:scale-95 disabled:opacity-30 disabled:grayscale transition-all shadow-sm text-left">
                      <div className="p-3 bg-gray-50 rounded-2xl text-emerald-600 shadow-sm">{item.icon}</div>
                      <div className="flex-1">
                        <div className="font-black text-sm text-emerald-900">{item.title} <span className="text-emerald-400">Lv.{config.levels[item.id]}</span></div>
                        <div className="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">{item.desc}</div>
                      </div>
                      <div className="font-black text-xs text-emerald-600">🍤{config.costs[item.id]}</div>
                    </button>
                  ))}
                </div>
                <div className="mt-8 pt-4 border-t border-gray-100 text-center opacity-20 font-black italic tracking-widest text-[9px] uppercase">Ppongpongi Adventure Final Edition</div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
